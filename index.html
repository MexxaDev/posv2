<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The West - POS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366F1">
  <meta name="description" content="Sistema de Punto de Venta - GG Beach House">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <script src="js/lib/chart.min.js"></script>
</head>

<body>
  <div id="app">
    <div id="mainContent"></div>
  </div>
  <div id="toast" class="toast"></div>
  <div id="networkStatus" class="network-status offline" style="display: none;">
    <i class="ti ti-wifi-off"></i> Sin conexión
  </div>

  <script src="js/services/database.js"></script>
  <script src="js/services/backupService.js"></script>
  <script src="js/services/dataStore.js"></script>
  <script src="js/services/authService.js"></script>
  <script src="js/services/articulosService.js"></script>
  <script src="js/services/clientesService.js"></script>
  <script src="js/services/ventasService.js"></script>
  <script src="js/services/mediosPagoService.js"></script>
  <script src="js/services/datosNegocioService.js"></script>
  <script src="js/services/cajaService.js"></script>
  <script src="js/services/whatsappService.js"></script>
  <script src="js/services/categoriasService.js"></script>

  <script src="js/components/router.js"></script>
  <script src="js/components/sidebar.js"></script>
  <script src="js/components/header.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/topNav.js"></script>

  <script src="js/pages/login.js"></script>
  <script src="js/pages/pos.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/catalogo.js"></script>

  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registration = await navigator.serviceWorker.register('/service-worker.js');
          console.log('Service Worker registrado:', registration);
        } catch (e) {
          console.warn('Service Worker no disponible:', e.message);
        }
      });
    }

    const networkStatus = document.getElementById('networkStatus');
    function updateOnlineStatus() {
      if (networkStatus) {
        networkStatus.style.display = navigator.onLine ? 'none' : 'flex';
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  </script>
</body>
</html>
